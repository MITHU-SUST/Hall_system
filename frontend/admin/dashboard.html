<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SMH Complaint System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="navbar-brand">📋 SMH Complaint System</div>
            <ul class="navbar-menu">
                <li><a href="../index.html">Home</a></li>
                <li id="adminName"></li>
                <li><button onclick="logout()"
                        style="background: rgba(255,255,255,0.3); padding: 0.5rem 1rem; border-radius: 0.5rem;">Logout</button>
                </li>
            </ul>
        </div>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="#" class="active" onclick="showSection('dashboard')">📊 Dashboard</a></li>
                <li><a href="#" onclick="showSection('all-complaints')">📋 All Complaints</a></li>
                <li><a href="#" onclick="showSection('pending')">⏳ Pending</a></li>
                <li><a href="#" onclick="showSection('solving')">🔧 Solving</a></li>
                <li><a href="#" onclick="showSection('solved')">✅ Solved</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <!-- DASHBOARD OVERVIEW -->
            <div id="dashboard" class="section">
                <h2>Admin Dashboard Overview</h2>

                <div class="grid grid-3 mt-3">
                    <div class="card">
                        <div class="card-body">
                            <h3>Total Complaints</h3>
                            <p style="font-size: 2rem; font-weight: bold; color: var(--primary);" id="countTotal">0</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <h3>Pending</h3>
                            <p style="font-size: 2rem; font-weight: bold; color: var(--pending);"
                                id="countTotalPending">0</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <h3>Solved</h3>
                            <p style="font-size: 2rem; font-weight: bold; color: var(--solved);" id="countTotalSolved">0
                            </p>
                        </div>
                    </div>
                </div>

                <h3 style="margin-top: 2rem;">Recent Complaints</h3>
                <div id="dashboardComplaints"></div>
            </div>

            <!-- ALL COMPLAINTS -->
            <div id="all-complaints" class="section hidden">
                <h2>All Complaints</h2>

                <div style="margin-bottom: 1.5rem; display: flex; gap: 1rem;">
                    <input type="text" id="searchBox" placeholder="🔍 Search complaints..."
                        style="flex: 1; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem;">
                    <select id="statusFilter"
                        style="padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem;">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="solving">Solving</option>
                        <option value="solved">Solved</option>
                    </select>
                </div>

                <div id="allComplaintsList"></div>
            </div>

            <!-- PENDING COMPLAINTS -->
            <div id="pending" class="section hidden">
                <h2>Pending Complaints</h2>
                <div id="pendingComplaints"></div>
            </div>

            <!-- SOLVING COMPLAINTS -->
            <div id="solving" class="section hidden">
                <h2>Solving Complaints</h2>
                <div id="solvingComplaints"></div>
            </div>

            <!-- SOLVED COMPLAINTS -->
            <div id="solved" class="section hidden">
                <h2>Solved Complaints</h2>
                <div id="solvedComplaints"></div>
            </div>
        </main>
    </div>

    <!-- COMPLAINT MODAL -->
    <div id="complaintModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow: auto;">
        <div
            style="background: white; margin: 5% auto; padding: 2rem; width: 90%; max-width: 600px; border-radius: 1rem;">
            <button onclick="closeModal()"
                style="float: right; border: none; background: none; font-size: 1.5rem; cursor: pointer;">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <Script src="../js/admin/dashboard.js"></Script>
</body>

</html>
