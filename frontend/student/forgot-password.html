<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SMH Complaint System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="navbar-brand">📋 SMH Complaint System</div>
            <ul class="navbar-menu">
                <li><a href="../index.html">Home</a></li>
            </ul>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Reset Password</h2>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 20px;">
                Enter your registration number to receive a reset token
            </p>
            <div id="alertBox"></div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="reg_no">Registration Number (10 digits) *</label>
                    <input type="text" id="reg_no" name="reg_no" required placeholder="Enter your registration number"
                        maxlength="10">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Get Reset Token</button>
            </form>

            <div class="auth-link">
                <p><a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="../js/student/forgot-password.js"></script>
</body>

</html>
