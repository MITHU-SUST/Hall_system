<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - SMH Complaint System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="navbar-brand">📋 SMH Complaint System</div>
            <ul class="navbar-menu">
                <li><a href="../index.html">Home</a></li>
            </ul>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Create Account</h2>
            <div id="alertBox"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="reg_no">Registration Number (10 digits) *</label>
                    <input type="text" id="reg_no" name="reg_no" required placeholder="e.g., 2021100001" maxlength="10">
                    <small style="color: var(--text-light);">Must be exactly 10 digits</small>
                </div>

                <div class="form-group">
                    <label for="room_no">Room Number *</label>
                    <input type="text" id="room_no" name="room_no" required placeholder="e.g., 301">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <div class="auth-link">
                Already registered? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const alertBox = document.getElementById('alertBox');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const reg_no = document.getElementById('reg_no').value;
            const room_no = document.getElementById('room_no').value;

            // Validate registration number
            if (!/^\d{10}$/.test(reg_no)) {
                showAlert('Registration number must be exactly 10 digits', 'error');
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/student/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reg_no, name, room_no })
                });

                const data = await response.json();

                if (data.error) {
                    showAlert(data.error, 'error');
                } else {
                    showAlert('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        });

        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertBox.innerHTML = '';
            alertBox.appendChild(alertDiv);
        }
    </script>
</body>

</html>
