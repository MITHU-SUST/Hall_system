<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - SMH Complaint System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="navbar-brand">📋 SMH Complaint System</div>
            <ul class="navbar-menu">
                <li><a href="../index.html">Home</a></li>
            </ul>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Create Account</h2>
            <div id="alertBox"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="reg_no">Registration Number (10 digits) *</label>
                    <input type="text" id="reg_no" name="reg_no" required placeholder="e.g., 2021100001" maxlength="10">
                    <small style="color: var(--text-light);">Must be exactly 10 digits</small>
                </div>

                <div class="form-group">
                    <label for="room_no">Room Number *</label>
                    <input type="text" id="room_no" name="room_no" required placeholder="e.g., 301">
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password"
                        minlength="4">
                    <small style="color: var(--text-light);">Minimum 4 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                        placeholder="Confirm your password">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <div class="auth-link">
                Already registered? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="../js/student/register.js"></script>
</body>

</html>
