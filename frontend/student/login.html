<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - SMH Complaint System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="navbar-brand">📋 SMH Complaint System</div>
            <ul class="navbar-menu">
                <li><a href="../index.html">Home</a></li>
            </ul>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Student Login</h2>
            <div id="alertBox"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="reg_no">Registration Number (10 digits) *</label>
                    <input type="text" id="reg_no" name="reg_no" required
                        placeholder="Enter your 10-digit registration number" maxlength="10">
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required
                        placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-link">
                <p><a href="forgot-password.html">Forgot Password?</a></p>
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="../js/student/login.js"></script>
</body>

</html>
