<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SMH Complaint System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="navbar-brand">📋 SMH Complaint System</div>
            <ul class="navbar-menu">
                <li><a href="../index.html">Home</a></li>
            </ul>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Reset Your Password</h2>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 20px;">
                Enter your new password below
            </p>
            <div id="alertBox"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="reg_no">Registration Number *</label>
                    <input type="text" id="reg_no" name="reg_no" readonly placeholder="Your registration number"
                        maxlength="10">
                    <small style="color: var(--text-light);">Auto-filled from previous step</small>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password *</label>
                    <input type="password" id="newPassword" name="newPassword" required placeholder="Enter new password"
                        minlength="4">
                    <small style="color: var(--text-light);">Minimum 4 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                        placeholder="Confirm new password">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
            </form>

            <div class="auth-link">
                <p><a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="../js/student/reset-password.js"></script>
</body>

</html>
